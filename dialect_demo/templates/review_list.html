<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>审核列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>✅ 待审核列表</h3>
        <table class="table mt-4">
            <thead>
                <tr>
                    <th>员工</th>
                    <th>文件名</th>
                    <th>提交时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for assignment in assignments %}
                <tr>
                    <td>{{ assignment.employee.name }}</td>
                    <td>{{ assignment.recording_filename }}</td>
                    <td>{{ assignment.submitted_at.strftime('%Y-%m-%d %H:%M') if assignment.submitted_at else '-' }}</td>
                    <td><a href="/review/{{ assignment.id }}" class="btn btn-sm btn-primary">审核</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">返回</a>
    </div>
</body>
</html>
