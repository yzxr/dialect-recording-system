<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>上传录音</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>🎤 上传录音</h3>
        <div class="alert alert-info">
            <strong>文件名格式：</strong>方言类型_姓名_话术编号_时间戳.wav<br>
            示例：闽南语_张三_S001_202604071030.wav
        </div>
        <form method="POST" enctype="multipart/form-data" class="mt-4">
            <div class="mb-3">
                <label class="form-label">录音文件</label>
                <input type="file" class="form-control" name="recording" accept=".wav,.mp3" required>
            </div>
            <button type="submit" class="btn btn-primary">上传</button>
            <a href="/assignments" class="btn btn-secondary">返回</a>
        </form>
    </div>
</body>
</html>
