<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>审核详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>✅ 审核详情</h3>
        <div class="card mt-4">
            <div class="card-body">
                <p><strong>员工：</strong>{{ assignment.employee.name }}</p>
                <p><strong>文件名：</strong>{{ assignment.recording_filename }}</p>
                <p><strong>话术内容：</strong>{{ assignment.script.content }}</p>
                
                <div class="alert alert-{{ 'success' if is_valid else 'danger' }} mt-3">
                    <strong>文件名校验：</strong>{{ message }}
                </div>
                
                <audio controls class="mt-3">
                    <source src="{{ assignment.recording_url }}" type="audio/wav">
                    您的浏览器不支持音频播放
                </audio>
                
                <form method="POST" class="mt-4">
                    <div class="mb-3">
                        <label class="form-label">审核结果</label>
                        <select class="form-select" name="result" required>
                            <option value="approved">通过</option>
                            <option value="rejected">驳回</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">驳回原因（仅驳回时填写）</label>
                        <input type="text" class="form-control" name="reject_reason" placeholder="文件名不规范/杂音/内容错误">
                    </div>
                    <button type="submit" class="btn btn-primary">提交审核</button>
                    <a href="/review" class="btn btn-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
