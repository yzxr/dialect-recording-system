<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>导入话术</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>📝 批量导入话术</h3>
        <form method="POST" enctype="multipart/form-data" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Excel 文件</label>
                <input type="file" class="form-control" name="file" accept=".xlsx,.xls" required>
            </div>
            <button type="submit" class="btn btn-primary">上传导入</button>
            <a href="/" class="btn btn-secondary">返回</a>
        </form>
        <div class="alert alert-info mt-3">
            <strong>Excel 格式（表头）：</strong><br>
            序号 | 方言文本 | 普通话文本 | 难度等级 | 备注<br><br>
            <strong>必填字段：</strong>序号、方言文本、普通话文本<br>
            <strong>可选字段：</strong>难度等级（1-5）、备注<br><br>
            <strong>说明：</strong>话术内容会自动组合为"方言文本（普通话：普通话文本）"格式
        </div>
    </div>
</body>
</html>
