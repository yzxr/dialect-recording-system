<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>导入话术</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>📝 导入话术</h3>
        <form method="POST" class="mt-4">
            <div class="mb-3">
                <label class="form-label">方言类型</label>
                <select class="form-select" name="dialect_type" required>
                    <option value="闽南语">闽南语</option>
                    <option value="客家话">客家话</option>
                    <option value="粤语">粤语</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">话术内容（每行一条）</label>
                <textarea class="form-control" name="script_text" rows="10" required placeholder="请输入话术内容，每行一条"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">导入并分配</button>
            <a href="/" class="btn btn-secondary">返回</a>
        </form>
    </div>
</body>
</html>
