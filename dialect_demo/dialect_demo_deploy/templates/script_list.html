<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>话术列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>📄 话术列表</h3>
        <table class="table mt-4">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>方言类型</th>
                    <th>内容</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
                {% for script in scripts %}
                <tr>
                    <td>{{ script.id }}</td>
                    <td>{{ script.dialect_type }}</td>
                    <td>{{ script.content[:50] }}...</td>
                    <td>
                        <span class="badge bg-{{ {'pending': 'warning', 'assigned': 'info', 'completed': 'success', 'recycled': 'danger'}[script.status] }}">
                            {{ script.status }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">返回</a>
    </div>
</body>
</html>
