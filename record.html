<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录音采集 - 方言语音采集平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .user-info {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 200px);
            min-height: 500px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
        
        /* 左侧话术栏 */
        .script-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        
        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .script-header h2 {
            color: #667eea;
            font-size: 1.2rem;
        }
        
        .script-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .script-content {
            flex: 1;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #333;
            border: 2px solid #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .script-content:focus {
            border-color: #667eea;
        }
        
        .script-content:empty:before {
            content: '请粘贴或输入话术内容...';
            color: #999;
        }
        
        /* 右侧录音区 */
        .recording-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .recording-title {
            color: #667eea;
            font-size: 1.3rem;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .record-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 5px;
        }
        
        .record-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .record-button.recording {
            background: #e53e3e;
            animation: pulse 1s infinite;
        }
        
        .record-button.fullscreen {
            width: 200px;
            height: 200px;
            font-size: 1.3rem;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .record-icon {
            font-size: 2rem;
        }
        
        .timer {
            font-size: 2.5rem;
            font-weight: 600;
            color: #667eea;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            background: #f0f0f0;
            width: 100%;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .upload-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 100%;
            text-align: center;
        }
        
        .control-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .logout-btn {
            padding: 8px 15px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .logout-btn:hover {
            background: #c53030;
        }
        
        .fullscreen-btn {
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .fullscreen-btn:hover {
            background: #5a67d8;
        }
        
        /* 滚动条样式 */
        .script-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .script-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        .script-content::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
        
        .script-content::-webkit-scrollbar-thumb:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ 方言语音采集</h1>
        </div>
        
        <div class="user-info">
            <div>
                <strong>用户：</strong><span id="userName">-</span>
                <span style="margin: 0 15px;">|</span>
                <strong>手机：</strong><span id="userPhone">-</span>
            </div>
            <div class="control-buttons">
                <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全屏录音</button>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- 左侧话术栏 -->
            <div class="script-card">
                <div class="script-header">
                    <h2>📖 话术内容</h2>
                    <div class="script-actions">
                        <button class="btn btn-primary" onclick="pasteScript()">📋 粘贴</button>
                        <button class="btn btn-success" onclick="saveScript()">💾 保存</button>
                    </div>
                </div>
                <div class="script-content" id="scriptContent" contenteditable="true" spellcheck="false">
                    今天天气真好，阳光明媚，万里无云。我站在窗前，看着外面的景色，心情格外舒畅。远处的山峦连绵起伏，近处的小河潺潺流水，构成了一幅美丽的画卷。鸟儿在枝头欢快地歌唱，仿佛在诉说着春天的故事。微风轻拂，带来阵阵花香，让人陶醉其中。这样美好的时光，真希望能永远停留。
                </div>
            </div>
            
            <!-- 右侧录音区 -->
            <div class="recording-card">
                <h2 class="recording-title">🎤 点击开始录音</h2>
                
                <button class="record-button" id="recordBtn" onclick="toggleRecording()">
                    <span class="record-icon">🎙️</span>
                    <span id="recordText">开始录音</span>
                </button>
                
                <div class="timer" id="timer">00:00</div>
                
                <div class="status" id="status">
                    状态：准备就绪
                </div>
                
                <div class="upload-status" id="uploadStatus"></div>
            </div>
        </div>
    </div>
    
    <script>
        // API 基础地址
        const API_BASE = '/api';
        
        // 页面加载时检查登录状态
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.name) {
                alert('请先登录');
                window.location.href = 'frontend/index.html';
                return;
            }
            
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userPhone').textContent = user.phone;
            
            // 加载保存的话术
            loadScript();
        };
        
        let isRecording = false;
        let timerInterval;
        let seconds = 0;
        let mediaRecorder;
        let audioChunks = [];
        let isFullscreen = false;
        
        // 粘贴话术
        async function pasteScript() {
            try {
                const text = await navigator.clipboard.readText();
                const scriptContent = document.getElementById('scriptContent');
                scriptContent.textContent = text;
                scriptContent.focus();
            } catch (error) {
                alert('粘贴失败，请手动输入或使用 Ctrl+V 粘贴');
            }
        }
        
        // 保存话术
        function saveScript() {
            const scriptContent = document.getElementById('scriptContent').textContent;
            localStorage.setItem('scriptContent', scriptContent);
            
            const status = document.getElementById('status');
            status.textContent = '✓ 话术已保存';
            status.className = 'status success';
            
            setTimeout(() => {
                status.textContent = '状态：准备就绪';
                status.className = 'status';
            }, 2000);
        }
        
        // 加载话术
        function loadScript() {
            const savedScript = localStorage.getItem('scriptContent');
            if (savedScript) {
                document.getElementById('scriptContent').textContent = savedScript;
            }
        }
        
        // 切换录音状态
        async function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            const recordText = document.getElementById('recordText');
            const status = document.getElementById('status');
            
            if (isRecording) {
                // 停止录音
                stopRecording();
                recordText.textContent = '开始录音';
                btn.classList.remove('recording');
                isRecording = false;
            } else {
                // 开始录音
                try {
                    await startRecording();
                    recordText.textContent = '停止录音';
                    btn.classList.add('recording');
                    status.textContent = '状态：录音中...';
                    status.className = 'status';
                    isRecording = true;
                } catch (error) {
                    status.textContent = '错误：' + error.message;
                    status.className = 'status error';
                }
            }
        }
        
        // 开始录音
        async function startRecording() {
            // 检查浏览器支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error('您的浏览器不支持录音功能');
            }
            
            // 获取麦克风权限
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 创建录音器
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            // 数据可用时
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            // 录音停止时
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                await uploadRecording(audioBlob);
            };
            
            // 开始录音
            mediaRecorder.start();
            startTimer();
        }
        
        // 停止录音
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                clearInterval(timerInterval);
            }
        }
        
        // 上传录音
        async function uploadRecording(audioBlob) {
            const status = document.getElementById('status');
            const uploadStatus = document.getElementById('uploadStatus');
            
            status.textContent = '状态：正在上传...';
            uploadStatus.textContent = '';
            
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            const formData = new FormData();
            formData.append('audio', audioBlob, `recording_${Date.now()}.wav`);
            formData.append('user_id', user.user_id || '');
            formData.append('phone', user.phone || '');
            
            try {
                const response = await fetch(API_BASE + '/upload.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    status.textContent = '状态：录音已保存';
                    status.className = 'status success';
                    uploadStatus.textContent = '✓ 文件：' + result.filename;
                } else {
                    status.textContent = '状态：上传失败';
                    status.className = 'status error';
                    uploadStatus.textContent = '✗ ' + result.message;
                }
            } catch (error) {
                status.textContent = '状态：上传失败';
                status.className = 'status error';
                uploadStatus.textContent = '✗ 网络错误：' + error.message;
            }
        }
        
        // 启动计时器
        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }
        
        // 全屏录音
        function toggleFullscreen() {
            const recordBtn = document.getElementById('recordBtn');
            isFullscreen = !isFullscreen;
            
            if (isFullscreen) {
                recordBtn.classList.add('fullscreen');
                document.querySelector('.fullscreen-btn').textContent = '❐ 退出全屏';
            } else {
                recordBtn.classList.remove('fullscreen');
                document.querySelector('.fullscreen-btn').textContent = '⛶ 全屏录音';
            }
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('user');
                window.location.href = 'frontend/index.html';
            }
        }
        
        // 支持 Ctrl+S 保存话术
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveScript();
            }
        });
        
        // 支持 Ctrl+V 粘贴
        document.getElementById('scriptContent').addEventListener('paste', function(e) {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text');
            document.execCommand('insertText', false, text);
        });
    </script>
</body>
</html>
